name: Delivery Platform CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore DeliveryPlatform/DeliveryPlatform.slnx

    - name: Build
      run: dotnet build DeliveryPlatform/DeliveryPlatform.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test DeliveryPlatform/DeliveryPlatform.slnx --no-build --verbosity normal
