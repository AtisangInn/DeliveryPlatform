<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Command - Master Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <!-- Auth Layer -->
    <div id="loginView" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-orb">N</div>
                <h1>Nexus Command</h1>
                <p>Authorized Personnel Only</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Terminal ID (Email)</label>
                    <input type="email" id="email" placeholder="admin@nexus.io" required>
                </div>
                <div class="input-group">
                    <label>Security Key</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div id="loginError" class="error-msg hidden">Access Denied: Invalid Credentials</div>
                <button type="submit" id="loginBtn" class="premium-btn">Initialize Connection</button>
            </form>
        </div>
    </div>

    <!-- Command Suite -->
    <div id="appView" class="app-layout hidden">
        
        <!-- Sidebar: Discovery & Intelligence -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="status-indicator live">LIVE</div>
                <h2>TELEMETRY</h2>
            </div>
            
            <div class="stats-panel">
                <div class="mini-stat">
                    <label>Revenue</label>
                    <span id="statRevenue">R0.00</span>
                </div>
                <div class="mini-stat">
                    <label>Active</label>
                    <span id="statOrders">0</span>
                </div>
            </div>

            <div class="feed-container">
                <div class="feed-header">EVENT STREAM</div>
                <div id="liveFeed" class="feed-list">
                    <!-- Events injected here -->
                    <div class="feed-empty">Listening for gateway signals...</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="text-btn">Terminate Session</button>
            </div>
        </aside>

        <!-- Main: Tactical Map -->
        <main class="tactical-map-container">
            <div id="adminMap"></div>
            <div class="map-overlay-top">
                <div class="search-bar">
                    <input type="text" placeholder="Search orders, drivers, merchants...">
                </div>
            </div>
        </main>

        <!-- Right: Operations & Details -->
        <section class="operations-panel">
            <div class="ops-header">
                <h2>OPERATIONS</h2>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="active">ACTIVE</button>
                    <button class="tab-btn" data-tab="merchants">MERCHANTS</button>
                </div>
            </div>

            <div id="tab-active" class="tab-content">
                <div id="activeOrdersList" class="order-grid">
                    <!-- Order cards -->
                </div>
            </div>

            <div id="tab-merchants" class="tab-content hidden">
                <div class="ops-actions">
                    <button id="addMerchantBtn" class="action-btn">+ Register Merchant</button>
                </div>
                <div id="merchantList" class="merchant-list">
                    <!-- Merchant entries -->
                </div>
            </div>
        </section>
    </div>

    <!-- Dynamic Elements -->
    <div id="merchantModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Register Merchant</h3>
            <form id="merchantForm">
                <input type="text" id="m_name" placeholder="Name" required>
                <input type="text" id="m_category" placeholder="Category" required>
                <input type="text" id="m_address" placeholder="Address" required>
                <input type="number" id="m_commission" placeholder="Commission %" step="0.1" value="10.0">
                <div class="modal-btns">
                    <button type="button" id="closeModalBtn" class="cancel-btn">Cancel</button>
                    <button type="submit" class="confirm-btn">Deploy</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
