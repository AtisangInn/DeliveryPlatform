<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Courier - Performance Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="driver-body">

    <!-- Auth Layer -->
    <div id="view-login" class="full-view driver-auth-bg">
        <div class="auth-box">
            <div class="brand">
                <span class="logo-orb secondary">D</span>
                <h1>COURIER</h1>
            </div>
            <h2>Logistics Node Alpha</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Courier ID (Email)" required>
                <input type="password" id="password" placeholder="Passkey" required>
                <button type="submit" id="loginBtn" class="secondary-btn">Initiate Shift</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP SHELL -->
    <div id="app-content" class="hidden">
        
        <!-- HEADER -->
        <header class="driver-header">
            <div class="courier-profile">
                <div class="avatar">⚡</div>
                <div class="profile-text">
                    <span id="courierName">Courier #001</span>
                    <label class="status-pill online">ONLINE</label>
                </div>
            </div>
            <div class="shift-stats">
                <div class="stat">
                    <label>EARNED</label>
                    <span id="earnedToday">R0.00</span>
                </div>
            </div>
        </header>

        <!-- VIEWS -->
        <main class="view-container">
            
            <!-- RADAR: Searching for Jobs -->
            <section id="view-radar" class="view">
                <div class="radar-container">
                    <div class="radar-circle"></div>
                    <div class="radar-circle delay-1"></div>
                    <div class="radar-circle delay-2"></div>
                    <div class="radar-center">📡</div>
                </div>
                <div class="radar-status">
                    <h2>Scanning for Requests...</h2>
                    <p>Maintain your position in Kagiso for optimal ping.</p>
                </div>

                <div id="availableOrdersList" class="request-queue">
                    <!-- Request cards -->
                </div>
            </section>

            <!-- ACTIVE: Current Delivery -->
            <section id="view-active" class="view hidden full-map-view">
                <div id="driverMap"></div>
                
                <div class="job-status-sheet">
                    <div class="job-header">
                        <div class="job-merchant">
                            <h3 id="activeMerchantName">Store Name</h3>
                            <p id="activeAddress">Delivery Address</p>
                        </div>
                        <div class="job-payout" id="activeAmount">R0.00</div>
                    </div>

                    <div class="workflow-actions">
                        <button id="btnPickupOrder" class="workflow-btn pickup" onclick="updateOrderStatus('PickedUp')">
                            CONFIRM PICKUP
                        </button>
                        <button id="btnDeliverOrder" class="workflow-btn deliver hidden" onclick="updateOrderStatus('Delivered')">
                            CONFIRM DELIVERY
                        </button>
                    </div>
                </div>
            </section>

        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav menu-fixed">
            <button class="nav-btn active" onclick="switchView('radar', this)">
                <span class="nav-icon">🎯</span>
                <label>Radar</label>
            </button>
            <button class="nav-btn" onclick="switchView('active', this)">
                <span class="nav-icon">📦</span>
                <label>Active</label>
            </button>
            <button class="nav-btn" onclick="logout()">
                <span class="nav-icon">🔌</span>
                <label>End Shift</label>
            </button>
        </nav>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
